<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARGANTUA🌌</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #050507; color: white; font-family: 'Space Grotesk', sans-serif; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Premium UI Panel */
        #ui-panel {
            position: absolute; top: 30px; left: 30px; z-index: 2;
            background: rgba(15, 15, 20, 0.45); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 25px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            width: 320px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .title-block h1 { margin: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #00ffaa; font-weight: 700; margin-bottom: 4px; }
        .title-block h2 { margin: 0; font-size: 32px; font-weight: 700; letter-spacing: -1px; background: linear-gradient(135deg, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .status-badge { 
            padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 6px; background: rgba(0, 255, 170, 0.1); color: #00ffaa; border: 1px solid rgba(0,255,170,0.3);
        }
        .status-badge.error { background: rgba(255, 50, 100, 0.1); color: #ff3264; border-color: rgba(255,50,100,0.3); }
        .dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; box-shadow: 0 0 10px currentColor; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Readouts */
        .readout-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .readout-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .readout-row:last-child { margin-bottom: 0; }
        .readout-label { color: #888; }
        .readout-value { font-weight: 600; color: #fff; text-align: right;}
        .highlight { color: #00ffaa; }

        /* Controls Grid */
        .controls { display: grid; gap: 6px; }
        .key { background: rgba(255,255,255,0.03); padding: 10px 12px; border-radius: 10px; font-size: 12px; color: #ccc; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; transition: 0.3s; }
        .key.active { background: rgba(0,255,170,0.1); border-color: rgba(0,255,170,0.3); color: #fff; transform: translateX(5px); }
        .icon { font-size: 18px; width: 24px; text-align: center; }

        /* Debug Window */
        #debug-window {
            position: absolute; bottom: 30px; right: 30px; width: 280px; height: 210px; z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; overflow: hidden;
            background-color: #000; transform: scaleX(-1); box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            display: none;
        }
        #video-element { display: none; }
        #debug-canvas { width: 100%; height: 100%; display: block; object-fit: cover; }

        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 50;
            background: #010102; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease;
        }
        .loader { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); border-top-color: #00ffaa; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <div style="color: #888; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;">Initializing Dual-Track Vision...</div>
    </div>

    <div id="ui-panel">
        <div class="header">
            <div class="title-block">
                <h1>Active Shape</h1>
                <h2 id="shape-name">Nebula</h2>
            </div>
            <div id="status-badge" class="status-badge"><div class="dot"></div><span id="status-text">Booting</span></div>
        </div>
        
        <div class="readout-box">
            <div class="readout-row"><span class="readout-label">Hands Detected</span><span id="hand-count" class="readout-value">0</span></div>
            <div class="readout-row"><span class="readout-label">Left Action</span><span id="action-left" class="readout-value highlight">Idle</span></div>
            <div class="readout-row"><span class="readout-label">Right Action</span><span id="action-right" class="readout-value highlight">Idle</span></div>
        </div>

        <div class="controls">
            <div id="ctrl-pinch" class="key"><span class="icon">🤏</span> Pinch to freely drag shape</div>
            <div id="ctrl-fist" class="key"><span class="icon">✊</span> Fist triggers Gravity Well</div>
            <div id="ctrl-swipe" class="key"><span class="icon">👋</span> Swipe left/right for next shape</div>
            <div id="ctrl-dual" class="key"><span class="icon">🤲</span> 2 Hands: Pull/Push to Scale & Twist</div>
        </div>
    </div>

    <div id="debug-window">
        <video id="video-element" autoplay playsinline></video>
        <canvas id="debug-canvas"></canvas>
    </div>
    
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- UI ELEMENTS ---
        const ui = {
            loading: document.getElementById('loading-screen'),
            badge: document.getElementById('status-badge'),
            statusTxt: document.getElementById('status-text'),
            handCount: document.getElementById('hand-count'),
            actionL: document.getElementById('action-left'),
            actionR: document.getElementById('action-right'),
            debugWin: document.getElementById('debug-window')
        };
        const controls = {
            pinch: document.getElementById('ctrl-pinch'),
            fist: document.getElementById('ctrl-fist'),
            swipe: document.getElementById('ctrl-swipe'),
            dual: document.getElementById('ctrl-dual')
        };

        // --- GLOBAL STATE ---
        let targetX = 0, targetY = 0, targetZ = 80;
        let globalScale = 1.0, baseHue = 0.6, explosionForce = 0, globalRotationZ = 0;
        let isFist = false, isPinching = false, isDualHand = false;

        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 80;

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const renderPass = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.6, 0.8, 0.2);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderPass); composer.addPass(bloomPass);

        // --- PARTICLES (Custom Shaders) ---
        const PARTICLE_COUNT = 15000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const baseTargets = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);
        const sizes = new Float32Array(PARTICLE_COUNT);

        for(let i = 0; i < PARTICLE_COUNT; i++) {
            let idx = i * 3;
            positions[idx] = (Math.random() - 0.5) * 300; positions[idx+1] = (Math.random() - 0.5) * 300; positions[idx+2] = (Math.random() - 0.5) * 300;
            baseTargets[idx] = positions[idx]; colors[idx] = 1.0; velocities[idx] = 0;
            sizes[i] = Math.random() * 2.5 + 0.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 } },
            vertexShader: `
                attribute float size; varying vec3 vColor;
                void main() {
                    vColor = color;
                    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (180.0 / -mvPos.z);
                    gl_Position = projectionMatrix * mvPos;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    float d = distance(gl_PointCoord, vec2(0.5));
                    if (d > 0.5) discard;
                    float alpha = smoothstep(0.5, 0.1, d) * 0.9;
                    gl_FragColor = vec4(vColor, alpha);
                }
            `,
            blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, vertexColors: true
        });

        const particles = new THREE.Points(geometry, shaderMaterial);
        scene.add(particles);

        // --- SHAPES ---
        const shapes = ['Nebula', 'DNA Helix', 'Galactic Core', 'Torus Knot'];
        let currentShape = 0;

        function updateShape() {
            document.getElementById('shape-name').innerText = shapes[currentShape];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let x, y, z; let idx = i * 3; let s = shapes[currentShape];
                if (s === 'Nebula') {
                    const t = Math.PI * 2 * (i / PARTICLE_COUNT) + (Math.random() * 0.5); const r = 2 + Math.random() * 12;
                    x = 16 * Math.pow(Math.sin(t), 3) * (r/10); y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * (r/10); z = (Math.random() - 0.5) * 15;
                } else if (s === 'DNA Helix') {
                    const t = (i / PARTICLE_COUNT) * Math.PI * 25; const r = 8 + (Math.random() * 1.5); const phase = i % 2 === 0 ? 0 : Math.PI; 
                    x = r * Math.cos(t + phase); y = (t - Math.PI*12) * 1.2; z = r * Math.sin(t + phase);
                } else if (s === 'Galactic Core') {
                    const angle = Math.random() * Math.PI * 2; const r = Math.random() * 30;
                    x = r * Math.cos(angle + r * 0.4); y = (Math.random() - 0.5) * (35 - r) * 0.15; z = r * Math.sin(angle + r * 0.4);
                } else if (s === 'Torus Knot') {
                    const u = Math.random() * Math.PI * 2; const v = Math.random() * Math.PI * 2; const r = 10 + 3 * Math.cos(v);
                    x = r * Math.cos(u); y = r * Math.sin(u); z = 3 * Math.sin(v) + (Math.random()-0.5)*2;
                }
                baseTargets[idx] = x; baseTargets[idx+1] = y; baseTargets[idx+2] = z;
            }
            explosionForce = 60; 
        }
        updateShape();

        // --- SMART GESTURE MATH (Scale-Invariant) ---
        function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }
        
        function analyzeHand(landmarks) {
            const wrist = landmarks[0], palm = landmarks[9], thumbTip = landmarks[4], indexTip = landmarks[8], middleTip = landmarks[12];
            
            // 1. Calculate relative scale of the hand in the frame
            const palmSize = getDistance(wrist, palm); 
            
            // 2. Normalize distances based on hand size
            const pinchDist = getDistance(thumbTip, indexTip) / palmSize;
            const fistDist = getDistance(wrist, middleTip) / palmSize;
            
            let state = "Open";
            if (fistDist < 1.0) state = "Fist"; // Normalized threshold
            else if (pinchDist < 0.4) state = "Pinch"; // Normalized threshold

            return { x: palm.x, y: palm.y, state: state, wristX: wrist.x };
        }

        // --- AI CAMERA LOGIC ---
        const videoElement = document.getElementById('video-element');
        const debugCanvas = document.getElementById('debug-canvas');
        const debugCtx = debugCanvas.getContext('2d');
        let swipeCooldown = 0, lastWristX = 0;

        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        // FIXED: maxNumHands set to 2
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            if(ui.loading.style.display !== "none") {
                ui.loading.style.opacity = "0";
                setTimeout(() => ui.loading.style.display = "none", 500);
                ui.badge.className = "status-badge"; ui.statusTxt.innerText = "Tracking Live";
                ui.debugWin.style.display = "block";
            }

            debugCanvas.width = videoElement.videoWidth; debugCanvas.height = videoElement.videoHeight;
            debugCtx.save(); debugCtx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
            debugCtx.drawImage(results.image, 0, 0, debugCanvas.width, debugCanvas.height);

            if (swipeCooldown > 0) swipeCooldown--;

            // Reset UI
            isFist = false; isPinching = false; isDualHand = false;
            ui.actionL.innerText = "Idle"; ui.actionR.innerText = "Idle";
            Object.values(controls).forEach(c => c.classList.remove('active'));

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const handsData = results.multiHandLandmarks;
                ui.handCount.innerText = handsData.length;

                for (const marks of handsData) {
                    if (window.drawConnectors) {
                        window.drawConnectors(debugCtx, marks, window.HAND_CONNECTIONS, {color: '#00ffaa', lineWidth: 2});
                        window.drawLandmarks(debugCtx, marks, {color: '#ffffff', lineWidth: 1, radius: 2});
                    }
                }

                if (handsData.length === 2) {
                    // --- DUAL HAND MODE ---
                    isDualHand = true;
                    controls.dual.classList.add('active');
                    
                    const h1 = analyzeHand(handsData[0]);
                    const h2 = analyzeHand(handsData[1]);
                    
                    ui.actionL.innerText = "Linked"; ui.actionR.innerText = "Linked";

                    // Center point between two hands
                    targetX = (((h1.x + h2.x) / 2) - 0.5) * 140;
                    targetY = -(((h1.y + h2.y) / 2) - 0.5) * 140;

                    // Distance controls scale
                    const dist = getDistance(h1, h2);
                    globalScale = Math.max(0.5, dist * 3.0);
                    baseHue = dist;

                    // Twist controls rotation
                    globalRotationZ = -Math.atan2(h2.y - h1.y, h2.x - h1.x);

                } else if (handsData.length === 1) {
                    // --- SINGLE HAND MODE ---
                    const hand = analyzeHand(handsData[0]);
                    
                    // Smooth tracking when open or pinching
                    if(hand.state !== "Fist") {
                        targetX += (((hand.x - 0.5) * 140) - targetX) * 0.2; 
                        targetY += ((-(hand.y - 0.5) * 140) - targetY) * 0.2;
                    }
                    
                    baseHue = hand.x;
                    globalScale += (1.0 - globalScale) * 0.1; // Lerp scale back to normal
                    globalRotationZ += (0 - globalRotationZ) * 0.1; // Lerp rotation back to 0

                    if (hand.state === "Fist") {
                        isFist = true;
                        ui.actionR.innerText = "Gravity Well";
                        controls.fist.classList.add('active');
                    } else if (hand.state === "Pinch") {
                        isPinching = true;
                        ui.actionR.innerText = "Dragging";
                        controls.pinch.classList.add('active');
                    } else {
                        ui.actionR.innerText = "Open / Hover";
                        
                        // Swipe Logic
                        if (swipeCooldown === 0 && Math.abs(hand.wristX - lastWristX) > 0.08) {
                            controls.swipe.classList.add('active');
                            currentShape = (currentShape + 1) % shapes.length;
                            updateShape(); swipeCooldown = 40;
                        }
                    }
                    lastWristX = hand.wristX;
                }
            } else {
                ui.handCount.innerText = "0";
                targetX *= 0.95; targetY *= 0.95; 
                globalScale += (1.0 - globalScale) * 0.1;
                globalRotationZ += (0 - globalRotationZ) * 0.1;
            }
            debugCtx.restore();
        });

        // Start Camera
        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });

        cameraFeed.start().catch(err => {
            ui.badge.className = "status-badge error"; ui.statusTxt.innerText = "Camera Blocked";
        });

        // --- PHYSICS & RENDER LOOP ---
        const colorObj = new THREE.Color();
        let time = 0;
        let localExplosion = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            shaderMaterial.uniforms.time.value = time;

            camera.position.z += (targetZ - camera.position.z) * 0.05;
            particles.rotation.y += 0.001; 
            
            // Apply dual-hand twist
            particles.rotation.z += (globalRotationZ - particles.rotation.z) * 0.15;

            if (explosionForce > 0) explosionForce *= 0.9;
            
            // Release fist = pop
            if(isFist) localExplosion = 120;
            else if (localExplosion > 0) { explosionForce = localExplosion; localExplosion = 0; }

            const posArray = geometry.attributes.position.array; const colArray = geometry.attributes.color.array;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let idx = i * 3;
                let bX = baseTargets[idx] * globalScale; 
                let bY = baseTargets[idx+1] * globalScale; 
                let bZ = baseTargets[idx+2] * globalScale;

                // FIST: Suck everything to the center point
                if (isFist) { bX *= 0.05; bY *= 0.05; bZ *= 0.05; }

                if (explosionForce > 1) { 
                    velocities[idx] += (Math.random() - 0.5) * explosionForce; 
                    velocities[idx+1] += (Math.random() - 0.5) * explosionForce; 
                    velocities[idx+2] += (Math.random() - 0.5) * explosionForce; 
                }

                posArray[idx] += velocities[idx]; posArray[idx+1] += velocities[idx+1]; posArray[idx+2] += velocities[idx+2];
                velocities[idx] *= 0.82; velocities[idx+1] *= 0.82; velocities[idx+2] *= 0.82; 

                const oX = Math.sin(time + i) * 1.5; const oY = Math.cos(time + i * 0.5) * 1.5;
                
                // Tighten lerp if pinching to make it feel more "held"
                const lerpSpeed = isPinching ? 0.15 : 0.06;

                posArray[idx] += (((bX + targetX) + oX) - posArray[idx]) * lerpSpeed;
                posArray[idx+1] += (((bY + targetY) + oY) - posArray[idx+1]) * lerpSpeed;
                posArray[idx+2] += (bZ - posArray[idx+2]) * lerpSpeed;

                const hue = (baseHue + (i/PARTICLE_COUNT) * 0.4 + time * 0.05) % 1.0;
                colorObj.setHSL(hue, 1.0, isFist ? 0.8 : 0.5 + (Math.sin(i)*0.2)); 
                colArray[idx] += (colorObj.r - colArray[idx]) * 0.1; colArray[idx+1] += (colorObj.g - colArray[idx+1]) * 0.1; colArray[idx+2] += (colorObj.b - colArray[idx+2]) * 0.1;
            }

            geometry.attributes.position.needsUpdate = true; geometry.attributes.color.needsUpdate = true;
            composer.render();
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
