<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes float-in { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
      .shape-container { animation: float-in 0.8s ease-out; }
      .nebula { animation: spin 20s linear infinite; transform-origin: 150px 75px; }
      .dna { animation: spin 15s linear infinite reverse; transform-origin: 300px 75px; }
      .galaxy { animation: spin 25s linear infinite; transform-origin: 450px 75px; }
      .torus { animation: spin 18s linear infinite reverse; transform-origin: 560px 80px; }
    </style>
  </defs>
  
  <rect width="600" height="300" fill="#0a0a0f"/>
  
  <!-- Nebula -->
  <g class="shape-container" style="animation-delay: 0s;">
    <g class="nebula">
      <circle cx="150" cy="30" r="2" fill="#00ff88" opacity="0.8"/>
      <circle cx="175" cy="45" r="2" fill="#00ff88" opacity="0.7"/>
      <circle cx="180" cy="75" r="2" fill="#00ff88" opacity="0.8"/>
      <circle cx="175" cy="105" r="2" fill="#00ff88" opacity="0.7"/>
      <circle cx="150" cy="120" r="2" fill="#00ff88" opacity="0.8"/>
      <circle cx="125" cy="105" r="2" fill="#00ff88" opacity="0.7"/>
      <circle cx="120" cy="75" r="2" fill="#00ff88" opacity="0.8"/>
      <circle cx="125" cy="45" r="2" fill="#00ff88" opacity="0.7"/>
      <circle cx="150" cy="50" r="1.5" fill="#00ff88" opacity="0.5"/>
      <circle cx="155" cy="65" r="1.5" fill="#00ff88" opacity="0.5"/>
      <circle cx="155" cy="85" r="1.5" fill="#00ff88" opacity="0.5"/>
      <circle cx="150" cy="100" r="1.5" fill="#00ff88" opacity="0.5"/>
    </g>
    <text x="150" y="155" font-size="14" text-anchor="middle" fill="#00ff88" font-weight="bold" font-family="monospace">NEBULA</text>
  </g>
  
  <!-- DNA Helix -->
  <g class="shape-container" style="animation-delay: 0.2s;">
    <g class="dna">
      <circle cx="300" cy="30" r="2" fill="#00f0ff" opacity="0.8"/>
      <circle cx="310" cy="50" r="2" fill="#00f0ff" opacity="0.7"/>
      <circle cx="300" cy="75" r="2.5" fill="#00f0ff" opacity="0.8"/>
      <circle cx="310" cy="100" r="2" fill="#00f0ff" opacity="0.7"/>
      <circle cx="300" cy="120" r="2" fill="#00f0ff" opacity="0.8"/>
      <circle cx="290" cy="100" r="2" fill="#00f0ff" opacity="0.7"/>
      <circle cx="290" cy="50" r="2" fill="#00f0ff" opacity="0.7"/>
      <circle cx="300" cy="65" r="1.5" fill="#00f0ff" opacity="0.4"/>
      <circle cx="300" cy="85" r="1.5" fill="#00f0ff" opacity="0.4"/>
    </g>
    <text x="300" y="155" font-size="14" text-anchor="middle" fill="#00f0ff" font-weight="bold" font-family="monospace">DNA HELIX</text>
  </g>
  
  <!-- Galactic Core -->
  <g class="shape-container" style="animation-delay: 0.4s;">
    <g class="galaxy">
      <circle cx="450" cy="30" r="2" fill="#a78bfa" opacity="0.8"/>
      <circle cx="465" cy="40" r="2" fill="#a78bfa" opacity="0.7"/>
      <circle cx="470" cy="60" r="2" fill="#a78bfa" opacity="0.8"/>
      <circle cx="465" cy="90" r="2" fill="#a78bfa" opacity="0.7"/>
      <circle cx="450" cy="110" r="2" fill="#a78bfa" opacity="0.8"/>
      <circle cx="435" cy="90" r="2" fill="#a78bfa" opacity="0.7"/>
      <circle cx="430" cy="60" r="2" fill="#a78bfa" opacity="0.8"/>
      <circle cx="435" cy="40" r="2" fill="#a78bfa" opacity="0.7"/>
      <circle cx="450" cy="70" r="1.5" fill="#a78bfa" opacity="0.4"/>
    </g>
    <text x="450" y="155" font-size="14" text-anchor="middle" fill="#a78bfa" font-weight="bold" font-family="monospace">GALACTIC</text>
  </g>
  
  <!-- Torus Knot -->
  <g class="shape-container" style="animation-delay: 0.6s;">
    <rect x="535" y="20" width="50" height="120" fill="none" stroke="#ff3d7f" stroke-width="1" opacity="0.2" rx="4"/>
    <g class="torus">
      <circle cx="560" cy="35" r="2" fill="#ff3d7f" opacity="0.8"/>
      <circle cx="570" cy="50" r="2" fill="#ff3d7f" opacity="0.7"/>
      <circle cx="575" cy="75" r="2" fill="#ff3d7f" opacity="0.8"/>
      <circle cx="570" cy="110" r="2" fill="#ff3d7f" opacity="0.7"/>
      <circle cx="560" cy="120" r="2" fill="#ff3d7f" opacity="0.8"/>
      <circle cx="550" cy="110" r="2" fill="#ff3d7f" opacity="0.7"/>
      <circle cx="545" cy="75" r="2" fill="#ff3d7f" opacity="0.8"/>
      <circle cx="550" cy="50" r="2" fill="#ff3d7f" opacity="0.7"/>
    </g>
    <text x="560" y="155" font-size="14" text-anchor="middle" fill="#ff3d7f" font-weight="bold" font-family="monospace">TORUS</text>
  </g>
</svg>
