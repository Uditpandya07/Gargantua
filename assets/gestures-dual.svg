<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse-scale { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
      .dual-box-1 { animation: pulse-scale 2.5s ease-in-out infinite; animation-delay: 0s; transform-origin: 150px 80px; }
      .dual-box-2 { animation: pulse-scale 2.5s ease-in-out infinite; animation-delay: 0.7s; transform-origin: 350px 80px; }
      .dual-box-3 { animation: pulse-scale 2.5s ease-in-out infinite; animation-delay: 1.4s; transform-origin: 500px 80px; }
    </style>
  </defs>
  
  <rect width="600" height="160" fill="#0a0a0f"/>
  
  <g class="dual-box-1">
    <rect x="50" y="20" width="200" height="120" fill="#00ff88" fill-opacity="0.05" stroke="#00ff88" stroke-width="2" rx="8"/>
    <text x="150" y="80" font-size="36" text-anchor="middle" fill="#00ff88" font-weight="bold">↔️</text>
    <text x="150" y="125" font-size="11" text-anchor="middle" fill="#8b8ba8" font-family="monospace" font-weight="600">PULL/PUSH</text>
  </g>
  
  <g class="dual-box-2">
    <rect x="250" y="20" width="200" height="120" fill="#a78bfa" fill-opacity="0.05" stroke="#a78bfa" stroke-width="2" rx="8"/>
    <text x="350" y="80" font-size="36" text-anchor="middle" fill="#a78bfa" font-weight="bold">🏎️</text>
    <text x="350" y="125" font-size="11" text-anchor="middle" fill="#8b8ba8" font-family="monospace" font-weight="600">TWIST</text>
  </g>
  
  <g class="dual-box-3">
    <rect x="450" y="20" width="100" height="120" fill="#ff3d7f" fill-opacity="0.05" stroke="#ff3d7f" stroke-width="2" rx="8"/>
    <text x="500" y="80" font-size="36" text-anchor="middle" fill="#ff3d7f" font-weight="bold">🤲</text>
    <text x="500" y="125" font-size="10" text-anchor="middle" fill="#8b8ba8" font-family="monospace" font-weight="600">CENTER</text>
  </g>
</svg>
